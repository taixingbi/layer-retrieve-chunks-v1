server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: retrieve-chunks
    static_configs:
      - targets:
          - localhost
        labels:
          job: retrieve-chunks
          service: layer-retrieve-chunks-v1-logging
          __path__: /var/log/retrieve-chunks/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            event: event
            timestamp: timestamp
            query: query
            latency_ms: latency_ms
            num_results: num_results
            status_code: status_code
            path: path
            method: method
