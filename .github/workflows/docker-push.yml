# Build the image from the repo Dockerfile and push to Docker Hub on every push to `main`.
#
# Repository secrets (Settings → Secrets and variables → Actions):
#   DOCKERHUB_USERNAME — Docker Hub username or org
#   DOCKERHUB_TOKEN    — Access token (recommended), not your account password
#
# Images:  <username>/layer-rag-query:latest   and   <username>/layer-rag-query:<git-sha>
name: Push to Docker Hub

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-push-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/layer-rag-query-v1:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/layer-rag-query-v1:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
